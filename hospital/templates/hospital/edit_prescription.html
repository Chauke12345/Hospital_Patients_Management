<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Prescription</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            font-family: Arial, sans-serif;
        }

        .container {
            margin-top: 40px;
            max-width: 700px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .title {
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="bg-dark text-white text-center py-3">
    <h4 class="m-0">🏥 Eddie’s Healthcare Center</h4>
</div>

<div class="container">

    <h2 class="title">✏ Edit Prescription</h2>

    <div class="card p-4">

        <form method="POST">
            {% csrf_token %}

            <!-- Medicine -->
            <div class="mb-3">
                <label class="form-label">Medicine Name</label>
                <input type="text"
                       name="medicine_name"
                       value="{{ prescription.medicine_name }}"
                       class="form-control"
                       required>
            </div>

            <!-- Dosage -->
            <div class="mb-3">
                <label class="form-label">Dosage</label>
                <input type="text"
                       name="dosage"
                       value="{{ prescription.dosage }}"
                       class="form-control"
                       required>
            </div>

            <!-- Instructions -->
            <div class="mb-3">
                <label class="form-label">Instructions</label>
                <textarea name="instructions"
                          class="form-control"
                          rows="4">{{ prescription.instructions }}</textarea>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between">

                <a href="{% url 'prescriptions_list' %}" class="btn btn-secondary">
                    ⬅ Back
                </a>

                <button type="submit" class="btn btn-primary">
                    💾 Save Changes
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
