<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Prescription</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef3ff, #f7f9fc);
            font-family: 'Segoe UI', sans-serif;
        }

        .page-header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .page-header h2 {
            font-weight: 700;
            color: #1f2d3a;
        }

        .page-header p {
            color: #6c757d;
            margin-top: 5px;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px 12px;
            border: 1px solid #e0e6ed;
        }

        .form-control:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 0.2rem rgba(74,144,226,0.15);
        }

        select.form-control {
            cursor: pointer;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 12px;
            transition: 0.3s ease;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(40,167,69,0.25);
        }

        .alert {
            border-radius: 10px;
        }

        .container {
            max-width: 700px;
        }

        .icon {
            font-size: 32px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
   <div class="page-header d-flex justify-content-between align-items-center px-3 py-2 bg-dark text-white rounded">

    <!-- BACK BUTTON -->
    <a href="/dashboard/" class="btn btn-light btn-sm">
        ← Back
    </a>

    <!-- CENTER TITLE -->
    <div class="text-center flex-grow-1">
        <h4 class="m-0">🏥 Eddie’s Healthcare Center</h4>
        <small class="text-light">Create Prescription</small>
    </div>

    <!-- RIGHT SPACER -->
    <div style="width:80px;"></div>

</div>

    <!-- ERROR -->
    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <!-- FORM CARD -->
    <div class="card p-4">

        <form method="POST">
            {% csrf_token %}

            <!-- PATIENT -->
            <div class="mb-3">
                <label class="form-label">Patient</label>
                <select name="patient" class="form-control" required>
                    <option value="">Select Patient</option>
                    {% for patient in patients %}
                        <option value="{{ patient.id }}">
                            {{ patient.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- DOCTOR -->
            <div class="mb-3">
                <label class="form-label">Doctor</label>
                <select name="doctor" class="form-control" required>
                    <option value="">Select Doctor</option>
                    {% for doctor in doctors %}
                        <option value="{{ doctor.id }}">
                            Dr. {{ doctor.first_name }} {{ doctor.last_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- MEDICINE -->
            <div class="mb-3">
                <label class="form-label">Medicine Name</label>
                <input type="text" name="medicine_name" class="form-control" required>
            </div>

            <!-- DOSAGE -->
            <div class="mb-3">
                <label class="form-label">Dosage</label>
                <input type="text" name="dosage" class="form-control" placeholder="e.g. Twice daily">
            </div>

            <!-- INSTRUCTIONS -->
            <div class="mb-3">
                <label class="form-label">Instructions</label>
                <textarea name="instructions" class="form-control" rows="4"
                          placeholder="Enter usage instructions..."></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Save Prescription
            </button>

        </form>
    </div>

</div>

</body>
</html>
